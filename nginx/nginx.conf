# ============================================================
# AsyncRAGSystem - Nginx 反向代理 + 负载均衡配置
# ============================================================
#
# 架构角色: Nginx 作为系统最前端的网关层
#   - 反向代理: 将外部请求转发到后端 FastAPI 节点
#   - 负载均衡: 将请求分发到多个 Uvicorn worker 或 FastAPI 实例
#   - 限流保护: 防止恶意高频请求压垮后端 LLM
#   - 连接缓冲: 慢客户端连接缓冲, 释放后端资源
#   - 静态资源: 可托管前端 SPA 静态文件 (如有)
#
# 部署方式:
#   1. 复制此文件到 Nginx 配置目录
#   2. 根据实际环境修改 upstream 服务器列表
#   3. nginx -t 测试配置正确性
#   4. nginx -s reload 热重载
# ============================================================

# ---- 上游服务器组 (负载均衡) ----
# 可配置多个 FastAPI 实例实现水平扩展
upstream fastapi_backend {
    # 负载均衡策略: least_conn (最少连接数), 适合LLM长连接场景
    least_conn;

    # FastAPI 节点列表 (根据实际部署修改)
    server 127.0.0.1:8000 weight=1 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8001 weight=1 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8002 weight=1 max_fails=3 fail_timeout=30s;

    # Keepalive 连接池: 复用与后端的TCP连接, 减少握手开销
    keepalive 128;
}

# ---- 限流区域定义 ----
# 基于客户端IP的请求频率限制
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# 基于客户端IP的并发连接数限制
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ---- HTTP 服务器 ----
server {
    listen 8080;
    server_name localhost;

    # 客户端请求体大小限制 (匹配 FastAPI 侧的 MAX_UPLOAD_SIZE_MB)
    client_max_body_size 50m;

    # ========================
    # 全局安全头
    # ========================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ========================
    # 访问日志 (JSON格式, 便于日志分析)
    # ========================
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_time":$upstream_response_time,'
        '"user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/rag_access.log json_combined;
    error_log  /var/log/nginx/rag_error.log warn;

    # ========================
    # API 代理
    # ========================
    location / {
        # ---- 限流 ----
        # burst=20: 允许20个请求的瞬时突发
        # nodelay: 突发请求立即处理, 不延迟
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # ---- 代理基本设置 ----
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;

        # ---- 代理头设置 ----
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";  # 配合 keepalive 清空 Connection 头

        # ---- 超时设置 (LLM 请求可能较慢) ----
        proxy_connect_timeout 10s;       # 连接后端超时
        proxy_send_timeout 180s;         # 发送请求到后端超时 (LLM生成)
        proxy_read_timeout 180s;         # 读取后端响应超时 (LLM生成)

        # ---- 缓冲设置 ----
        # 关闭代理缓冲, 让 SSE 流式响应实时推送到客户端
        proxy_buffering off;

        # 对于非流式请求可开启缓冲 (根据路径判断)
        # proxy_buffering on;
        # proxy_buffer_size 4k;
        # proxy_buffers 8 16k;

        # ---- 缓冲临时文件 ----
        proxy_max_temp_file_size 0;  # 禁止缓冲到磁盘
    }

    # ========================
    # SSE 流式端点特殊配置
    # ========================
    location /api/v1/query/stream {
        limit_req zone=api_limit burst=10 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # SSE 必需: 关闭缓冲, 长超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 禁用 Nginx 对响应的分块缓冲
        chunked_transfer_encoding on;

        # 告知 Nginx 不要缓冲 SSE 流
        proxy_set_header X-Accel-Buffering no;
    }

    # ========================
    # 健康检查端点 (无缓冲, 快速响应)
    # ========================
    location /api/v1/health {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;
        proxy_buffering off;

        # 健康检查不需要限流 (但保留基本连接限制)
        limit_req zone=api_limit burst=50 nodelay;
    }

    # ========================
    # API 文档 (Swagger/ReDoc)
    # ========================
    location /docs {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
